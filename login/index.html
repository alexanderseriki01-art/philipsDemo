<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in — Phillips Consulting TMS</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="../assets/css/tokens.css" />
    <link rel="stylesheet" href="../assets/css/base.css" />
    <link rel="stylesheet" href="../assets/css/auth.css" />
</head>
<body>

<div class="auth-page auth-page--immersive">

    <div class="auth-bg" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="grid"></div>
        <div class="three-mount"></div>
    </div>

    <header class="auth-top">
        <a class="logo logo--light" href="../">
            <span class="logo-mark">phillips</span>
            <span class="logo-sub">CONSULTING</span>
        </a>
        <a class="auth-top-link" href="../">&larr; Back to site</a>
    </header>

    <main class="auth-main">
        <section class="auth-card" aria-labelledby="auth-title">
            <span class="eyebrow eyebrow-line">Participant Portal</span>
            <h2 id="auth-title">Welcome <em>back.</em></h2>
            <p class="auth-sub">Sign in to manage enrolments, view payments, and download your certificates.</p>

            <form onsubmit="event.preventDefault(); window.location.href='../portal/';">
                <div class="field">
                    <label>Email Address</label>
                    <input class="input" type="email" value="adaeze.okonkwo@stanbicibtc.com" autocomplete="email" />
                </div>
                <div class="field">
                    <label>Password</label>
                    <input class="input" type="password" value="passphrase" autocomplete="current-password" />
                </div>

                <div style="display:flex;justify-content:space-between;align-items:center;margin:6px 0 24px;">
                    <label class="checkbox"><input type="checkbox" checked />Remember me</label>
                    <a class="link-blue" href="#" style="font-size:13.5px;">Forgot password?</a>
                </div>

                <button class="btn btn-primary btn-block btn-lg btn-arrow" type="submit">Sign in to Portal</button>
            </form>

            <div class="auth-or"><span>or continue with</span></div>

            <div class="auth-provider">
                <button class="btn" type="button" onclick="alert('SSO flow would launch here')">
                    <span class="glyph sso"></span>Corporate SSO
                </button>
                <button class="btn" type="button" onclick="alert('Microsoft sign-in')">
                    <span class="glyph org"></span>Microsoft
                </button>
            </div>

            <div class="auth-toggle">
                New participant? <a href="../register/">Create an account</a>
            </div>
        </section>
    </main>

    <footer class="auth-bottom">
        <div class="auth-stats">
            <span><strong>500+</strong>organisations</span>
            <span class="dot-sep"></span>
            <span><strong>50,000+</strong>professionals trained</span>
            <span class="dot-sep"></span>
            <span><strong>20+</strong>years of practice</span>
        </div>
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="../assets/js/three-login.js"></script>
<script src="../assets/js/app.js"></script>
</body>
</html>
